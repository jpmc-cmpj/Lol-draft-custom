<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C89B3C; --gold-light: #F0E6D3; --gold-dim: #785A28;
    --blue: #0AC8B9; --blue-dark: #0593A2;
    --red: #C8392B; --green: #27AE60; --orange: #E67E22;
    --bg: #010A13; --bg3: #0D1E33; --panel: #091428;
    --border: #1E2D3D; --text: #A3B3C0; --text-light: #C8D6E0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text-light);
    font-family:'Rajdhani',sans-serif; font-weight:600;
    min-height:100vh; overflow-x:hidden; font-size:16px;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(10,200,185,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(200,155,60,0.06) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='none' stroke='%231E2D3D' stroke-width='0.3' opacity='0.4'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0;
  }
  .container { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:0 24px; }

  /* HEADER */
  header {
    border-bottom:1px solid var(--gold-dim); padding:18px 0;
    background:linear-gradient(180deg,rgba(10,20,40,0.97) 0%,transparent 100%);
    position:sticky; top:0; z-index:100; backdrop-filter:blur(12px);
  }
  header .container { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Cinzel',serif; font-size:24px; font-weight:900; color:var(--gold); letter-spacing:4px; text-transform:uppercase; text-shadow:0 0 30px rgba(200,155,60,0.4); }
  .logo span { color:var(--gold-light); }
  nav { display:flex; gap:8px; }
  .nav-btn {
    background:transparent; border:1px solid var(--border); color:var(--text);
    font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; padding:7px 18px;
    cursor:pointer; transition:all 0.2s; position:relative;
  }
  .nav-btn::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--gold); transform:scaleX(0); transition:transform 0.2s; }
  .nav-btn:hover,.nav-btn.active { color:var(--gold-light); border-color:var(--gold-dim); }
  .nav-btn:hover::after,.nav-btn.active::after { transform:scaleX(1); }

  /* PAGES */
  .page { display:none; padding:36px 0; }
  .page.active { display:block; }

  /* SECTION TITLE */
  .section-title {
    font-family:'Cinzel',serif; font-size:12px; font-weight:700;
    letter-spacing:5px; text-transform:uppercase; color:var(--gold);
    margin-bottom:24px; display:flex; align-items:center; gap:14px;
  }
  .section-title::before,.section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim)); }
  .section-title::after { background:linear-gradient(270deg,transparent,var(--gold-dim)); }

  /* FORM */
  .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; max-width:780px; margin:0 auto 24px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold-dim); font-weight:700; }
  .form-group input,.form-group select {
    background:var(--bg3); border:1px solid var(--border); color:var(--text-light);
    font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600;
    padding:10px 12px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; width:100%;
  }
  .form-group input:focus,.form-group select:focus { border-color:var(--gold-dim); }
  .form-group input::placeholder { color:#2a3d50; }
  .form-group select option { background:var(--bg3); }

  /* BUTTONS */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; padding:11px 24px;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .btn-gold { background:linear-gradient(135deg,var(--gold-dim) 0%,var(--gold) 50%,var(--gold-dim) 100%); color:var(--bg); }
  .btn-gold:hover { filter:brightness(1.15); transform:translateY(-1px); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover { border-color:var(--gold-dim); color:var(--gold-light); }
  .btn-danger { background:transparent; border:1px solid rgba(200,57,43,0.4); color:var(--red); font-size:10px; padding:4px 10px; letter-spacing:1px; flex-shrink:0; }
  .btn-danger:hover { background:rgba(200,57,43,0.1); }
  .btn-blue { background:linear-gradient(135deg,var(--blue-dark),var(--blue)); color:var(--bg); }
  .btn-blue:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-green { background:linear-gradient(135deg,#1a6b3a,var(--green)); color:#fff; }
  .btn-green:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-red-t { background:linear-gradient(135deg,#7a1a1a,var(--red)); color:#fff; }
  .btn-red-t:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-purple { background:linear-gradient(135deg,#4a2060,#8e44ad); color:#fff; }
  .btn-purple:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-sm { padding:7px 14px; font-size:11px; }

  /* PLAYER CARD */
  .players-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; margin-bottom:24px; }
  .player-card { background:var(--panel); border:1px solid var(--border); padding:12px; display:flex; align-items:flex-start; gap:10px; transition:border-color 0.2s; position:relative; min-width:0; }
  .player-card:hover { border-color:var(--gold-dim); }
  .player-card.clickable { cursor:pointer; }
  .player-card.selected { border-color:var(--gold); background:rgba(200,155,60,0.05); }
  .player-card.selected::before { content:'✓'; position:absolute; top:7px; right:9px; color:var(--gold); font-size:13px; font-weight:700; }
  .rank-badge { width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; position:relative; }
  .rank-badge::after { content:''; position:absolute; inset:0; border-radius:50%; border:1px solid currentColor; opacity:0.3; }
  .player-info { flex:1; min-width:0; overflow:hidden; }
  .player-name { font-size:15px; font-weight:700; color:var(--text-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
  .player-meta { font-size:11px; font-weight:600; color:var(--text); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-riot { font-size:10px; font-weight:600; color:#3d5468; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }

  /* RANK COLORS */
  .rank-iron{color:#8A8A8A} .rank-bronze{color:#AD5A20} .rank-silver{color:#A0B4C8}
  .rank-gold{color:#C89B3C} .rank-platinum{color:#38B8A0} .rank-emerald{color:#2ECC71}
  .rank-diamond{color:#5B9BD5} .rank-master{color:#9B59B6} .rank-grandmaster{color:#E74C3C}
  .rank-challenger{color:#F1C40F}

  /* STATS */
  .stats-bar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .stat-chip { display:flex; align-items:center; gap:7px; background:var(--panel); border:1px solid var(--border); padding:7px 14px; font-size:12px; font-weight:600; letter-spacing:1px; }
  .stat-chip .val { color:var(--gold); font-weight:700; font-family:'Cinzel',serif; }

  /* ACTIONS */
  .actions-bar { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
  .select-info { text-align:center; font-size:13px; font-weight:600; color:var(--text); letter-spacing:2px; margin-bottom:16px; }
  .select-info span { color:var(--gold); font-weight:700; }

  /* MATCH CARD */
  .matches-container { display:flex; flex-direction:column; gap:24px; }
  .match-card { background:var(--panel); border:1px solid var(--border); overflow:hidden; }
  .match-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; background:linear-gradient(135deg,rgba(10,20,40,0.9),rgba(20,30,55,0.9));
    border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px;
  }
  .match-title { font-family:'Cinzel',serif; font-size:14px; font-weight:700; letter-spacing:3px; color:var(--gold); }
  .match-meta { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .match-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:6px; }

  /* BALANCE TAG */
  .balance-tag { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:3px 10px; border:1px solid; }
  .balance-perfect  { color:var(--blue);   border-color:var(--blue);   background:rgba(10,200,185,0.08); }
  .balance-good     { color:var(--green);  border-color:var(--green);  background:rgba(39,174,96,0.08); }
  .balance-medium   { color:var(--gold);   border-color:var(--gold-dim);background:rgba(200,155,60,0.08); }
  .balance-hard     { color:var(--orange); border-color:var(--orange); background:rgba(230,126,34,0.08); }
  .balance-very-hard{ color:var(--red);    border-color:var(--red);    background:rgba(200,57,43,0.08); }

  .diff-label { font-size:11px; font-weight:600; color:var(--text); letter-spacing:1px; }
  .diff-label span { color:var(--gold-light); font-weight:700; }

  /* TEAMS GRID */
  .teams-grid { display:grid; grid-template-columns:1fr 1fr; }
  .team { padding:14px 18px; }
  .team:first-child { border-right:1px solid var(--border); }
  .team-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .team-name { font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; font-weight:900; }
  .team-blue .team-name { color:var(--blue); }
  .team-red  .team-name { color:var(--red); }
  .team-score { font-family:'Cinzel',serif; font-size:17px; font-weight:700; }
  .team-blue .team-score { color:var(--blue); }
  .team-red  .team-score { color:var(--red); }

  /* TEAM PLAYER ROW */
  .team-player { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid rgba(30,45,61,0.5); }
  .team-player:last-child { border-bottom:none; }
  .tp-role-slot {
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    background:rgba(30,45,61,0.6); border:1px solid var(--border);
    font-size:13px; flex-shrink:0; position:relative;
  }
  .tp-badge { width:28px; height:28px; font-size:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; position:relative; }
  .tp-badge::after { content:''; position:absolute; inset:0; border-radius:50%; border:1px solid currentColor; opacity:0.25; }
  .tp-info { flex:1; min-width:0; }
  .tp-name { font-size:13px; font-weight:700; color:var(--text-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tp-meta { font-size:10px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tp-riot { font-size:10px; font-weight:600; color:#3d5468; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .assigned-role-label {
    font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--gold-dim); background:rgba(120,90,40,0.15); border:1px solid var(--gold-dim);
    padding:1px 6px; flex-shrink:0;
  }
  .assigned-role-label.is-secondary { color:#5B9BD5; border-color:#5B9BD5; background:rgba(91,155,213,0.1); }

  /* RESULT BUTTONS */
  .result-btns { display:flex; gap:6px; padding:10px 18px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); flex-wrap:wrap; align-items:center; }
  .result-btns span { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text); margin-right:4px; }
  .result-btn { font-size:10px; padding:6px 14px; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--bg3); border:1px solid var(--gold-dim); color:var(--gold-light); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; padding:12px 20px; z-index:999; transform:translateY(80px); opacity:0; transition:all 0.3s; }
  .toast.show { transform:translateY(0); opacity:1; }

  /* EMPTY */
  .empty-state { text-align:center; padding:60px 24px; grid-column:1/-1; }
  .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text); }
  .empty-state p.sub { font-size:11px; color:#2a3d50; margin-top:7px; letter-spacing:1px; text-transform:none; }

  .center { text-align:center; }

  @media(max-width:700px){
    .logo{font-size:17px;}
    .form-grid{grid-template-columns:1fr;}
    .teams-grid{grid-template-columns:1fr;}
    .team:first-child{border-right:none;border-bottom:1px solid var(--border);}
    .players-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<header>
  <div class="container">
    <div class="logo">Custom <span>Draft</span></div>
    <nav>
      <button class="nav-btn active" onclick="showPage('players',this)">Joueurs</button>
      <button class="nav-btn" onclick="showPage('draft',this)">Draft</button>
    </nav>
  </div>
</header>

<!-- PAGE JOUEURS -->
<div class="page active" id="page-players">
  <div class="container">
    <div class="section-title">Ajouter un joueur</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Pseudo</label>
        <input type="text" id="inp-name" placeholder="ShadowKiller99" maxlength="24">
      </div>
      <div class="form-group">
        <label>Riot ID</label>
        <input type="text" id="inp-riot" placeholder="ShadowKiller99#EUW" maxlength="32">
      </div>
      <div class="form-group">
        <label>Rôle principal</label>
        <select id="inp-role">
          <option value="top">⚔️ Top</option>
          <option value="jungle">🌿 Jungle</option>
          <option value="mid">✨ Mid</option>
          <option value="adc">🏹 ADC</option>
          <option value="support">🛡️ Support</option>
          <option value="fill">🔄 Fill</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rôle secondaire</label>
        <select id="inp-role2">
          <option value="none">— Aucun —</option>
          <option value="top">⚔️ Top</option>
          <option value="jungle">🌿 Jungle</option>
          <option value="mid">✨ Mid</option>
          <option value="adc">🏹 ADC</option>
          <option value="support">🛡️ Support</option>
          <option value="fill">🔄 Fill</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rang</label>
        <select id="inp-rank" onchange="toggleDiv()">
          <option value="iron">🔩 Iron</option>
          <option value="bronze">🥉 Bronze</option>
          <option value="silver">🥈 Silver</option>
          <option value="gold">🥇 Gold</option>
          <option value="platinum">💎 Platinum</option>
          <option value="emerald">🌿 Emerald</option>
          <option value="diamond">💠 Diamond</option>
          <option value="master">👑 Master</option>
          <option value="grandmaster">🔥 Grandmaster</option>
          <option value="challenger">⚡ Challenger</option>
        </select>
      </div>
      <div class="form-group" id="div-group">
        <label>Division</label>
        <select id="inp-div">
          <option value="4">IV</option>
          <option value="3">III</option>
          <option value="2">II</option>
          <option value="1">I</option>
        </select>
      </div>
    </div>
    <div class="center">
      <button class="btn btn-gold" onclick="addPlayer()">+ Ajouter le joueur</button>
    </div>
    <br><br>
    <div class="section-title">Roster</div>
    <div id="stats-bar" class="stats-bar"></div>
    <div id="players-grid" class="players-grid"></div>
  </div>
</div>

<!-- PAGE DRAFT -->
<div class="page" id="page-draft">
  <div class="container">
    <div class="section-title">Sélectionner les joueurs</div>
    <p class="select-info">Joueurs présents ce soir — <span id="sel-count">0</span> sélectionné(s)</p>
    <div id="draft-select-grid" class="players-grid"></div>
    <div class="actions-bar">
      <button class="btn btn-outline" onclick="selectAll()">Tous sélectionner</button>
      <button class="btn btn-outline" onclick="clearSelection()">Tout déselectionner</button>
      <button class="btn btn-gold" onclick="generateDraft()">⚔️ Générer le Draft</button>
      <button class="btn btn-purple" onclick="randomDraft()">🎲 Aléatoire équilibré</button>
    </div>
    <div id="matches-container" class="matches-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════
const RANKS = {
  iron:        {label:'Iron',        base:1,  icon:'🔩',cls:'rank-iron',        hasDivision:true},
  bronze:      {label:'Bronze',      base:2,  icon:'🥉',cls:'rank-bronze',      hasDivision:true},
  silver:      {label:'Silver',      base:3,  icon:'🥈',cls:'rank-silver',      hasDivision:true},
  gold:        {label:'Gold',        base:4,  icon:'🥇',cls:'rank-gold',        hasDivision:true},
  platinum:    {label:'Platinum',    base:5,  icon:'💎',cls:'rank-platinum',    hasDivision:true},
  emerald:     {label:'Emerald',     base:6,  icon:'🌿',cls:'rank-emerald',     hasDivision:true},
  diamond:     {label:'Diamond',     base:7,  icon:'💠',cls:'rank-diamond',     hasDivision:true},
  master:      {label:'Master',      base:8,  icon:'👑',cls:'rank-master',      hasDivision:false},
  grandmaster: {label:'Grandmaster', base:9,  icon:'🔥',cls:'rank-grandmaster', hasDivision:false},
  challenger:  {label:'Challenger',  base:10, icon:'⚡',cls:'rank-challenger',  hasDivision:false},
};
const ROLE_ICONS = {top:'⚔️',jungle:'🌿',mid:'✨',adc:'🏹',support:'🛡️',fill:'🔄',none:'—'};
const ROLE_LABELS = {top:'Top',jungle:'Jungle',mid:'Mid',adc:'ADC',support:'Support',fill:'Fill',none:'—'};
const MAIN_ROLES  = ['top','jungle','mid','adc','support'];
const NO_DIV = ['master','grandmaster','challenger'];

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function playerScore(p){
  const r = RANKS[p.rank];
  if(!r.hasDivision) return r.base;
  return r.base + (4 - parseInt(p.division||4)) * 0.25;
}
function rankLabel(p){
  const r = RANKS[p.rank];
  if(!r.hasDivision) return r.label;
  const rom=['','I','II','III','IV'];
  return `${r.label} ${rom[parseInt(p.division||4)]}`;
}
function balanceLabel(diff){
  if(diff<0.01) return {cls:'balance-perfect',  text:'⚖️ Parfaitement équilibré'};
  if(diff<=0.75) return {cls:'balance-good',    text:'✅ Bien équilibré'};
  if(diff<=1.5)  return {cls:'balance-medium',  text:'⚠️ Légèrement déséquilibré'};
  if(diff<=3)    return {cls:'balance-hard',    text:'🔥 Déséquilibré'};
  return              {cls:'balance-very-hard', text:'💀 Très déséquilibré'};
}
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function teamScore(team){ return team.reduce((s,p)=>s+playerScore(p),0); }

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let players  = JSON.parse(localStorage.getItem('customDraft_v3')||'[]');
let selected = new Set();
// last match results: [{blue:[],red:[],assignedBlue:{},assignedRed:{}}]
let lastMatches = [];

function save(){ localStorage.setItem('customDraft_v3', JSON.stringify(players)); }

// ═══════════════════════════════════
// NAV
// ═══════════════════════════════════
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='draft') renderDraftSelect();
}
function toggleDiv(){
  const rank = document.getElementById('inp-rank').value;
  document.getElementById('div-group').style.display = NO_DIV.includes(rank)?'none':'flex';
}

// ═══════════════════════════════════
// PLAYERS
// ═══════════════════════════════════
function addPlayer(){
  const name     = document.getElementById('inp-name').value.trim();
  const riot     = document.getElementById('inp-riot').value.trim();
  const role     = document.getElementById('inp-role').value;
  const role2    = document.getElementById('inp-role2').value;
  const rank     = document.getElementById('inp-rank').value;
  const division = NO_DIV.includes(rank) ? null : document.getElementById('inp-div').value;
  if(!name){ toast('Entre un pseudo !'); return; }
  players.push({id:Date.now(), name, riot, role, role2, rank, division});
  save(); renderPlayers();
  document.getElementById('inp-name').value='';
  document.getElementById('inp-riot').value='';
  toast('Joueur ajouté !');
}
function deletePlayer(id){
  players=players.filter(p=>p.id!==id);
  selected.delete(id);
  save(); renderPlayers();
}
function renderPlayers(){
  const grid=document.getElementById('players-grid');
  const stats=document.getElementById('stats-bar');
  if(!players.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">⚔️</div><p>Aucun joueur enregistré</p><p class="sub">Ajoute tes potes ci-dessus pour commencer</p></div>`;
    stats.innerHTML=''; return;
  }
  const avg=(players.reduce((s,p)=>s+playerScore(p),0)/players.length).toFixed(2);
  const top=players.reduce((a,b)=>playerScore(a)>playerScore(b)?a:b);
  stats.innerHTML=`
    <div class="stat-chip">Joueurs <span class="val">${players.length}</span></div>
    <div class="stat-chip">Niveau moyen <span class="val">${avg} pts</span></div>
    <div class="stat-chip">Top rank <span class="val">${RANKS[top.rank].icon} ${top.name}</span></div>`;
  grid.innerHTML=players.map(p=>{
    const r=RANKS[p.rank];
    const r2label = p.role2 && p.role2!=='none' ? ` / ${ROLE_ICONS[p.role2]} ${ROLE_LABELS[p.role2]}` : '';
    return `
      <div class="player-card">
        <div class="rank-badge ${r.cls}">${r.icon}</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-meta">${ROLE_ICONS[p.role]} ${ROLE_LABELS[p.role]}${r2label} · ${rankLabel(p)}</div>
          ${p.riot?`<div class="player-riot">${p.riot}</div>`:''}
        </div>
        <div class="card-right">
          <button class="btn btn-danger" onclick="deletePlayer(${p.id})">✕</button>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════
// DRAFT SELECT
// ═══════════════════════════════════
function renderDraftSelect(){
  const grid=document.getElementById('draft-select-grid');
  document.getElementById('matches-container').innerHTML='';
  if(!players.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">👥</div><p>Aucun joueur enregistré</p><p class="sub">Va dans l'onglet Joueurs pour ajouter tes potes</p></div>`;
    return;
  }
  grid.innerHTML=players.map(p=>{
    const r=RANKS[p.rank]; const sel=selected.has(p.id);
    const r2label = p.role2 && p.role2!=='none' ? ` / ${ROLE_ICONS[p.role2]}` : '';
    return `
      <div class="player-card clickable ${sel?'selected':''}" onclick="toggleSelect(${p.id})" id="sel-${p.id}">
        <div class="rank-badge ${r.cls}">${r.icon}</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>

          ${p.riot?`<div class="player-riot">${p.riot}</div>`:''}
        </div>
      </div>`;
  }).join('');
  updateSelCount();
}
function toggleSelect(id){
  selected.has(id)?selected.delete(id):selected.add(id);
  document.getElementById('sel-'+id).classList.toggle('selected',selected.has(id));
  updateSelCount();
}
function selectAll(){ players.forEach(p=>selected.add(p.id)); renderDraftSelect(); }
function clearSelection(){ selected.clear(); renderDraftSelect(); }
function updateSelCount(){ document.getElementById('sel-count').textContent=selected.size; }

// ═══════════════════════════════════
// DRAFT ALGO — rôle principal + secondaire
// ═══════════════════════════════════

/**
 * Assign roles to players within a team to maximise coverage of main roles.
 * Returns a map: { playerId → assignedRole }
 * Priority: primary role first, then secondary, then fill.
 */
function assignRoles(team){
  const assigned = {}; // id → role
  const roleFilled = {}; // role → bool
  const unassigned = [];

  // First pass: assign primary role if slot free
  for(const p of team){
    if(p.role!=='fill' && !roleFilled[p.role]){
      assigned[p.id] = p.role;
      roleFilled[p.role] = true;
    } else {
      unassigned.push(p);
    }
  }
  // Second pass: assign secondary role
  for(const p of unassigned.filter(p=>p.role2 && p.role2!=='none' && p.role2!=='fill')){
    if(!roleFilled[p.role2]){
      assigned[p.id] = p.role2;
      roleFilled[p.role2] = true;
    }
  }
  // Third pass: remaining get any free slot or fill
  for(const p of team){
    if(assigned[p.id]) continue;
    const free = MAIN_ROLES.find(r=>!roleFilled[r]);
    if(free){ assigned[p.id]=free; roleFilled[free]=true; }
    else { assigned[p.id]='fill'; }
  }
  return assigned;
}

/**
 * Score for how "role-matched" a split is.
 * Lower = better: penalises mismatches (secondary used = 0.5 pen, none = 1 pen)
 */
function rolePenalty(team, assigned){
  let pen = 0;
  for(const p of team){
    const ar = assigned[p.id];
    if(!ar) continue;
    if(p.role === ar) continue; // perfect
    if(p.role2 && p.role2!=='none' && p.role2===ar) pen += 0.5; // secondary ok
    else pen += 1; // mismatch
  }
  return pen;
}

function balanceTeams(group){
  const n=group.length, half=Math.floor(n/2);
  let best=null, bestScore=Infinity;

  for(let attempt=0; attempt<10000; attempt++){
    const sh = shuffle(group);
    const blue = sh.slice(0, half);
    const red  = sh.slice(half);
    const ab   = assignRoles(blue);
    const ar   = assignRoles(red);
    const scoreDiff = Math.abs(teamScore(blue)-teamScore(red));
    const rolePen   = rolePenalty(blue,ab) + rolePenalty(red,ar);
    // Combined score: score diff weighted more, role penalty secondary
    const combined  = scoreDiff * 3 + rolePen;
    if(combined < bestScore){
      bestScore = combined;
      best = {blue:[...blue], red:[...red], assignedBlue:ab, assignedRed:ar};
      if(combined < 0.05) break;
    }
  }
  return best;
}

// ═══════════════════════════════════
// GENERATE DRAFT
// ═══════════════════════════════════
function getPool(){
  return players.filter(p=>selected.has(p.id));
}
function generateDraft(){
  const pool=getPool();
  if(pool.length<2){ toast('Sélectionne au moins 2 joueurs !'); return; }
  const matches=buildMatches(pool);
  lastMatches=matches;
  renderMatches(matches);
}
function randomDraft(){
  const pool=getPool();
  if(pool.length<2){ toast('Sélectionne au moins 2 joueurs !'); return; }
  // Force different result by adding small random noise to scores during one build
  const matches=buildMatches(pool, true);
  lastMatches=matches;
  renderMatches(matches);
}
function buildMatches(pool, forceRandom=false){
  const sorted=[...pool].sort((a,b)=>playerScore(b)-playerScore(a));
  if(forceRandom){
    // Shuffle within ±0.5pt score brackets for variety
    for(let i=0;i<sorted.length-1;i++){
      if(Math.abs(playerScore(sorted[i])-playerScore(sorted[i+1]))<0.5 && Math.random()<0.6){
        [sorted[i],sorted[i+1]]=[sorted[i+1],sorted[i]];
      }
    }
  }
  const numMatches=Math.ceil(pool.length/10);
  const groups=[];
  for(let m=0;m<numMatches;m++){
    let g=sorted.slice(m*10,(m+1)*10);
    if(g.length===1 && groups.length>0){ groups[groups.length-1].push(g[0]); continue; }
    if(g.length>0) groups.push(g);
  }
  return groups.map(g=>balanceTeams(g));
}

// ═══════════════════════════════════
// RESULT HANDLING — tournoi cross-match
// ═══════════════════════════════════
// results[i] = 'blue' | 'red' | null
let matchResults = [];

function reportResult(matchIdx, winnerSide){
  matchResults[matchIdx] = winnerSide;

  // Update UI for this match: highlight winner, mark result buttons
  updateMatchResultUI(matchIdx, winnerSide);

  // Check if all matches have results → show tournament button
  checkTournamentReady();
}

function updateMatchResultUI(matchIdx, winnerSide){
  const card = document.getElementById('match-card-'+matchIdx);
  if(!card) return;
  // Update result buttons styling
  const btns = card.querySelectorAll('.result-btn');
  btns.forEach(b => b.style.opacity='0.4');
  const winner = card.querySelector(`.result-btn[data-side="${winnerSide}"]`);
  if(winner){ winner.style.opacity='1'; winner.style.outline='2px solid var(--gold)'; }
  // Show small winner badge in header
  const header = card.querySelector('.match-header');
  const old = header.querySelector('.winner-badge');
  if(old) old.remove();
  const badge = document.createElement('div');
  badge.className='winner-badge';
  badge.style.cssText='font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border:1px solid;color:'+(winnerSide==='blue'?'var(--blue)':'var(--red)')+';border-color:'+(winnerSide==='blue'?'var(--blue)':'var(--red)')+';background:'+(winnerSide==='blue'?'rgba(10,200,185,0.1)':'rgba(200,57,43,0.1)');
  badge.textContent = '🏆 ' + (winnerSide==='blue' ? 'Bleue gagne' : 'Rouge gagne');
  header.appendChild(badge);
}

function checkTournamentReady(){
  const allDone = lastMatches.length > 1 &&
    lastMatches.every((_,i) => matchResults[i] != null);

  // Remove old tournament button if exists
  const old = document.getElementById('tournament-btn-wrap');
  if(old) old.remove();

  if(allDone){
    const container = document.getElementById('matches-container');
    const wrap = document.createElement('div');
    wrap.id='tournament-btn-wrap';
    wrap.style.cssText='display:flex;justify-content:center;gap:12px;padding:16px 0;flex-wrap:wrap;';
    wrap.innerHTML=`
      <button class="btn btn-green" onclick="generateTournament('winners')">🏆 Draft Gagnants vs Gagnants</button>
      <button class="btn btn-red-t" onclick="generateTournament('losers')">💀 Draft Perdants vs Perdants</button>`;
    container.appendChild(wrap);
    wrap.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function generateTournament(side){
  // Collect winners or losers from each match
  const pool = [];
  lastMatches.forEach((match, i) => {
    const result = matchResults[i];
    if(!result) return;
    const team = side==='winners'
      ? (result==='blue' ? match.blue : match.red)
      : (result==='blue' ? match.red  : match.blue);
    pool.push(...team);
  });

  if(pool.length < 2){
    toast('Pas assez de joueurs pour un tournoi !'); return;
  }

  const label   = side==='winners' ? '🏆 TOURNOI GAGNANTS' : '💀 TOURNOI PERDANTS';
  const color   = side==='winners' ? 'var(--green)' : 'var(--red)';
  const match   = balanceTeams(pool);
  const bScore  = +teamScore(match.blue).toFixed(2);
  const rScore  = +teamScore(match.red).toFixed(2);
  const diff    = +Math.abs(bScore-rScore).toFixed(2);
  const bal     = balanceLabel(diff);

  // Remove old tournament result of same type
  const oldId = 'tournament-result-'+side;
  const oldEl = document.getElementById(oldId);
  if(oldEl) oldEl.remove();

  const div = document.createElement('div');
  div.id = oldId;
  div.className = 'match-card';
  div.style.cssText = `border-color:${color};margin-top:8px;`;
  div.innerHTML = `
    <div class="match-header" style="border-bottom-color:${color}33;">
      <div class="match-title" style="color:${color};letter-spacing:3px;">${label}</div>
      <div class="match-meta">
        <div class="diff-label">Écart : <span>${diff} pts</span></div>
        <div class="balance-tag ${bal.cls}">${bal.text}</div>
      </div>
    </div>
    <div class="teams-grid">
      <div class="team team-blue">
        <div class="team-header"><div class="team-name">ÉQUIPE BLEUE</div><div class="team-score">${bScore} pts</div></div>
        ${match.blue.map(p=>playerRow(p,match.assignedBlue)).join('')}
      </div>
      <div class="team team-red">
        <div class="team-header"><div class="team-name">ÉQUIPE ROUGE</div><div class="team-score">${rScore} pts</div></div>
        ${match.red.map(p=>playerRow(p,match.assignedRed)).join('')}
      </div>
    </div>`;

  const container = document.getElementById('matches-container');
  container.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════
// RENDER MATCHES
// ═══════════════════════════════════
function renderMatches(matches){
  const container=document.getElementById('matches-container');
  if(!matches.length){ container.innerHTML=''; return; }
  matchResults = new Array(matches.length).fill(null);
  container.innerHTML=matches.map((match,i)=>{
    const bScore=+teamScore(match.blue).toFixed(2);
    const rScore=+teamScore(match.red).toFixed(2);
    const diff=+Math.abs(bScore-rScore).toFixed(2);
    const bal=balanceLabel(diff);
    const showResult = matches.length > 1
      ? `<div class="result-btns">
          <span>Résultat :</span>
          <button class="btn btn-blue btn-sm result-btn" data-side="blue" onclick="reportResult(${i},'blue')">🏆 Bleue gagne</button>
          <button class="btn btn-red-t btn-sm result-btn" data-side="red" onclick="reportResult(${i},'red')">🏆 Rouge gagne</button>
        </div>`
      : '';
    return `
      <div class="match-card" id="match-card-${i}">
        <div class="match-header">
          <div class="match-title">Équipe ${i+1}</div>
          <div class="match-meta">
            <div class="diff-label">Écart : <span>${diff} pts</span></div>
            <div class="balance-tag ${bal.cls}">${bal.text}</div>
          </div>
        </div>
        <div class="teams-grid">
          <div class="team team-blue">
            <div class="team-header"><div class="team-name">ÉQUIPE BLEUE</div><div class="team-score">${bScore} pts</div></div>
            ${match.blue.map(p=>playerRow(p,match.assignedBlue)).join('')}
          </div>
          <div class="team team-red">
            <div class="team-header"><div class="team-name">ÉQUIPE ROUGE</div><div class="team-score">${rScore} pts</div></div>
            ${match.red.map(p=>playerRow(p,match.assignedRed)).join('')}
          </div>
        </div>
        ${showResult}
      </div>`;
  }).join('');
  container.scrollIntoView({behavior:'smooth',block:'start'});
}

function playerRow(p, assigned){
  const r=RANKS[p.rank];
  const ar=assigned?assigned[p.id]:null;
  const isPrimary = ar && ar===p.role;
  const isSecondary = ar && p.role2 && ar===p.role2;
  const roleLabel = ar ? `${ROLE_ICONS[ar]} ${ROLE_LABELS[ar]}` : '';
  const badgeCls = !ar ? '' : isPrimary ? '' : isSecondary ? 'is-secondary' : 'is-secondary';
  return `
    <div class="team-player">
      <div class="tp-badge ${r.cls}">${r.icon}</div>
      <div class="tp-info">
        <div class="tp-name">${p.name}</div>
        <div class="tp-meta">${rankLabel(p)}</div>
        ${p.riot?`<div class="tp-riot">${p.riot}</div>`:''}
      </div>
      ${ar?`<div class="assigned-role-label ${!isPrimary?'is-secondary':''}">${roleLabel}</div>`:''}
    </div>`;
}

// ═══════════════════════════════════
// TOAST
// ═══════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
renderPlayers(); toggleDiv();
</script>
